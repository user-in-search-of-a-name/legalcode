name: legalcode desktop release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-13
            package: bun run package:mac
          - platform: windows
            os: windows-2025
            package: bun run package:win
          - platform: linux
            os: ubuntu-24.04
            package: bun run package:linux

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - uses: ./.github/actions/setup-bun

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rpm

      - name: Build desktop app
        run: bun run build
        working-directory: packages/desktop
        env:
          OPENCODE_CHANNEL: prod
          LEGALCODE_SKIP_SIGNING: "true"

      - name: Package desktop app
        run: ${{ matrix.package }}
        working-directory: packages/desktop
        timeout-minutes: 60
        env:
          OPENCODE_CHANNEL: prod
          LEGALCODE_SKIP_SIGNING: "true"
          GH_TOKEN: ${{ github.token }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: legalcode-desktop-${{ matrix.platform }}
          path: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/*.blockmap
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.zip
            packages/desktop/dist/*.AppImage
            packages/desktop/dist/*.deb
            packages/desktop/dist/*.rpm
            packages/desktop/dist/latest*.yml
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: legalcode-desktop-*
          path: dist
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PRERELEASE: ${{ inputs.prerelease }}
          TAG: ${{ inputs.tag }}
        run: |
          notes="Free LegalCode Desktop installers. The open-source build is unsigned unless project signing secrets are configured; macOS users may need to approve the app in System Settings."
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber --repo "$GH_REPO"
            exit 0
          fi

          args=(release create "$TAG" dist/* --repo "$GH_REPO" --title "LegalCode Desktop ${TAG}" --notes "$notes")
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
